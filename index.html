<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <meta name="theme-color" content="#0a0613">

  <meta name="apple-mobile-web-app-capable" content="yes">

  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <title>Night Market — Pocket Autobattler</title>

  <style>
    html,
    body {
      margin: 0;
      height: 100%;
      background: #0a0613;
      color: #f5ecd9;
      overflow: hidden;
    }

    html:not(.ready) #app {
      visibility: hidden;
    }

    .screen {
      display: none;
    }

    .screen.on {
      display: flex;
    }
  </style>

  <link rel="stylesheet" href="/src/styles/main.css">

  <link rel="preload" as="image" href="/Images/Start_Screen_Background.png">

  <link rel="prefetch" as="image" href="/Images/shop_background.png">
  <link rel="prefetch" as="image" href="/Images/shop_opening.png">

  <link rel="prefetch" as="image" href="/Images/The_Witch_Hagra_of_the_Bramblewood.png">
  <link rel="prefetch" as="image" href="/Images/playto_The_Vampire_Count_Mordrel.png">
  <link rel="prefetch" as="image" href="/Images/playto_The_Werewolf_Fenra_Moonscar.png">
  <link rel="prefetch" as="image" href="/Images/The_Sorcerer_Azael_Tide-Speaker.png">
  <link rel="prefetch" as="image" href="/Images/The_Queen_Seraphine_Lantern_Queen.png">
  <link rel="prefetch" as="image" href="/Images/The_Fire_Golem_Cinderhulk.png">
  <link rel="prefetch" as="image" href="/Images/The_Goblin_Snitch_Coppertooth.png">
  <link rel="prefetch" as="image" href="/Images/The_Griffin_Sky-Marshal_Aello.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700;900&family=Spectral:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

</head>

<body>

  <div id="app">

    <canvas id="bg3d"></canvas>

    <div class="title-screen-bg" aria-hidden="true"></div>

    <div id="bg-grad"></div>

    <canvas id="fx-canvas"></canvas>



    <div class="screen on" id="title-screen">

      <div class="title-screen-scrim" aria-hidden="true"></div>

      <h1>NIGHT<br>MARKET</h1>

      <div class="sub">Stock your stall with enchanted wares. When the lanterns dim, they fight for you.</div>

      <div class="title-enter" id="title-enter" role="slider" aria-label="Swipe right to enter the market" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
        <div class="title-enter-track" id="title-enter-track">
          <div class="title-enter-fill" aria-hidden="true"></div>
          <span class="title-enter-label">Enter the market</span>
          <div class="title-enter-thumb" id="title-enter-thumb">
            <span class="title-enter-arrow" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M5 12h12M13 7l5 5-5 5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
          </div>
        </div>
      </div>

    </div>



    <div class="screen" id="hero-screen">

      <div class="hero-head">
        <h2 class="hero-name" id="hero-name"></h2>
      </div>

      <div class="hero-coverflow" id="hero-coverflow" role="listbox" aria-label="Choose your peddler"></div>

      <div class="hero-meta">
        <div class="hero-class" id="hero-class"></div>
        <p class="hero-pass" id="hero-pass"></p>
      </div>

      <button class="btn primary hero-pledge" id="btn-pledge" type="button" hidden>Pledge your loyalty</button>

    </div>



    <div class="screen" id="shop-screen">

      <div id="hud">

        <span class="day" id="hud-day">NIGHT I</span>

        <div class="hud-stats">

          <button type="button" class="stat-chip win" id="hud-wins" aria-label="The 10 Lords"><span class="stat-ico" aria-hidden="true">⚔</span><span id="hud-wins-val">0 / 10</span></button>

          <button type="button" class="stat-chip life" id="hud-lives" aria-label="Hearts"><span class="stat-ico" aria-hidden="true">❤</span><span id="hud-lives-val">3 / 3</span></button>

        </div>

      </div>

      <div id="shop-body">

        <div class="shop-wares-block">

          <div class="wares-toolbar">

            <span class="section-title">Shop</span>

            <button class="btn btn-compact" id="btn-reroll">Reroll&nbsp;·&nbsp;<span class="coin"></span><span id="reroll-cost">1</span></button>

          </div>

          <div class="shop-carousel-scroll" id="shop-carousel-scroll">

            <div id="carousel" class="edge-track"></div>

          </div>

        </div>

        <div class="section-title section-title-stall">Your stall</div>

        <div id="board" class="stall-track scroll-lane__track"></div>

      </div>

    </div>



    <div class="screen" id="battle-screen">

      <div id="battle-top">

        <div class="battle-top-readout">

          <span id="bt-timer" class="display">0.0</span>

        </div>

        <div id="battle-header-actions" class="battle-header-actions" hidden>

          <button class="btn ghost btn-compact" id="btn-report" type="button">Report</button>

          <button class="btn primary btn-compact" id="btn-continue" type="button">Continue</button>

        </div>

      </div>

      <div class="fighter enemy" id="e-panel">

        <div class="portrait" id="e-face"></div>

        <div class="fi">

          <div class="fname">

            <span class="who" id="e-name"></span>

            <span class="hpnum" id="e-hpnum"></span>

          </div>

          <div class="hpbar">

            <div class="hp" id="e-hp"></div>

            <div class="sh" id="e-sh"></div>

            <div class="hpt" id="e-hpt"></div>

          </div>

          <div class="status-row">

            <span class="st burn" id="e-burn">🔥<b></b></span>

            <span class="st poison" id="e-poison">☠<b></b></span>

            <span class="st shield" id="e-shield">🛡<b></b></span>

            <span class="st curse" id="e-curse">🕯<b></b></span>

            <span class="st thorns" id="e-thorns">💢<b></b></span>

          </div>

        </div>

      </div>

      <div id="battle-wares">

        <div id="e-board" class="edge-track cboard"></div>

        <div id="combat-ticker" class="combat-ticker" aria-live="polite"></div>

        <div id="p-board" class="edge-track cboard"></div>

      </div>

    </div>



    <div id="shop-opening" class="shop-opening" aria-hidden="true">
      <img src="/Images/shop_opening.png" alt="" draggable="false" />
      <div class="shop-opening-scrim" aria-hidden="true"></div>
      <footer class="shop-opening-foot">
        <p id="shop-opening-caption" class="shop-opening-caption">My shop is open...</p>
      </footer>
    </div>

    <div id="boss-intro" class="boss-intro" aria-hidden="true">
      <img id="boss-intro-img" alt="" draggable="false" />
      <div class="boss-intro-scrim" aria-hidden="true"></div>
      <h2 id="boss-intro-name" class="boss-intro-name"></h2>
      <p id="boss-intro-threat" class="boss-intro-threat"></p>
    </div>

    <div id="lords-gallery" class="lords-gallery" aria-hidden="true">
      <div class="lords-gallery-scrim" aria-hidden="true"></div>
      <div class="lords-gallery-inner">
        <header class="lords-gallery-head">
          <h2 class="lords-gallery-title">The 10 Lords</h2>
          <p id="lords-gallery-sub" class="lords-gallery-sub"></p>
        </header>
        <div id="lords-gallery-grid" class="lords-gallery-grid"></div>
      </div>
    </div>

    <div id="result-screen"></div>



    <div id="player-dock" class="hidden dock-mode-shop">

      <button type="button" class="dock-avatar" id="dock-avatar" aria-label="Your peddler">

        <span id="p-face">🧙</span>

      </button>

      <div class="dock-center">

        <div class="dock-shop-readout">

          <span class="gold"><span class="coin"></span><span id="hud-gold">0</span></span>

        </div>

        <div class="dock-battle-readout">

          <div class="fname dock-fname">

            <span class="who" id="p-name"></span>

            <span class="hpnum" id="p-hpnum"></span>

          </div>

          <div class="hpbar dock-hpbar">

            <div class="hp" id="p-hp"></div>

            <div class="sh" id="p-sh"></div>

            <div class="hpt" id="p-hpt"></div>

          </div>

          <div class="status-row dock-status">

            <span class="st burn" id="p-burn">🔥<b></b></span>

            <span class="st poison" id="p-poison">☠<b></b></span>

            <span class="st shield" id="p-shield">🛡<b></b></span>

            <span class="st curse" id="p-curse">🕯<b></b></span>

            <span class="st thorns" id="p-thorns">💢<b></b></span>

          </div>

        </div>

      </div>

      <button class="btn primary dock-fight" id="btn-fight">Battle</button>

    </div>



    <div class="overlay" id="sheet-overlay">

      <div class="sheet" id="item-sheet"></div>

    </div>

    <div class="overlay" id="hero-overlay">

      <div class="sheet" id="hero-sheet"></div>

    </div>

    <div class="overlay" id="report-overlay">

      <div class="sheet battle-report-sheet" id="battle-report-sheet"></div>

    </div>

    <div class="overlay stat-hint-overlay" id="stat-hint-overlay">

      <div class="stat-hint-card" id="stat-hint-card" role="dialog" aria-modal="true"></div>

    </div>

  </div>

  <script>document.documentElement.classList.add('ready');</script>

  <script type="module" src="/src/main.ts"></script>

</body>

</html>
